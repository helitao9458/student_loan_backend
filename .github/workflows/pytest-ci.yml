name: Backend 自动化测试

on:
  push:
    branches: [ main,master ]
  pull_request:
    branches: [ main,master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r test/api_test/requirements.txt

      - name: Run test
        run: |
          cd test/api_test
          python run.py